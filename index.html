<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/media-query.css">
    <title>Tela de Login</title>
</head>
<body>
    <main>
        <section id="login">
            <article id="imagem">

            </article>
            <article id="formulario">
                <h1>Login</h1>
                <p>Seja bem vindo(a) a sua tela de login! Preencha os seus dados nos campos correspondestes e acesse a sua conta.</p>
                <form action="login.php" method="post" autocomplete="on">
                    <div>
                        <span class="material-icons">person</span>
                        <input type="email" name="email" id="idemail" placeholder="Digite o seu e-mail" required autocomplete="email" maxlength="20">
                        <label for="idemail">Login</label>
                    </div>
                    <div>
                        <span class="material-icons">vpn_key</span>
                        <input type="password" name="senha" id="idsenha" placeholder="Digite a sua senha" required autocomplete="current-password" minlength="8" maxlength="15">
                        <label for="idsenha">Senha</label>
                    </div>
                        <input type="submit" value="Entrar" class="bt-enviar">
                        <a href="#" class="esq-senha">Esqueci a minha senha <span class="material-icons">mail</span></a>
                </form>

            </article>
        </section>
    </main>
</body>
</html>
